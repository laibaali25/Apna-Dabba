<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="custlogin.css">

  <title>Login</title>

  <script defer>
    console.log("JS Loaded");

    document.addEventListener("DOMContentLoaded", function () {
      document.getElementById("custLoginButton").onclick = function () {
        console.log("Login clicked");

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        // Simple validation
        if (username === "" || password === "") {
          alert("Please fill in all fields");
          return;
        }

        // Redirect with username
        window.location.href = "custMain.html?username=" + encodeURIComponent(username);
      };
    });
  </script>
</head>

<body>

  <div class="container">

    <!-- LEFT SIDE IMAGE -->
    <div class="image-section">
      <div class="overlay-text">
        <h1>Apna Dabba</h1>
        <p>Fresh meals delivered to your doorstep</p>
      </div>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="form-section">

      <div class="card">
        <h2>Welcome Back 👋</h2>

        <input type="text" id="username" placeholder="Mobile / Email">
        <input type="password" id="password" placeholder="Password">

        <div class="forgot">Forgot Password?</div>

        <button id="custLoginButton" class="btn">Login</button>

        <div class="sign-up">
          Customer? <a href="custSignUp.html">Create account</a>
        </div>
      </div>

    </div>

  </div>

</body>

</html>
